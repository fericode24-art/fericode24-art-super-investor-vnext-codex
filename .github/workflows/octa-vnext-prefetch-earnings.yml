name: OCTA vNext Prefetch Earnings

on:
  schedule:
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: octa-vnext-earnings
  cancel-in-progress: false

jobs:
  prefetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run earnings prefetch
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: python -u -m qfas.qfas_prefetch_earnings --top-n 200

      - name: Commit earnings cache
        run: |
          if [ ! -f data/backtest/earnings_cache.json ]; then
            echo "::error::earnings_cache.json non generato"
            exit 1
          fi
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions OCTA vNext Earnings"
          git add data/backtest/earnings_cache.json
          if ! git diff --cached --quiet; then
            git commit -m "[octa-vnext-earnings] prefetch $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          else
            echo "No earnings cache changes"
          fi

      - name: Alert on failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && exit 0
          curl -fsS -X POST "https://ntfy.sh/$NTFY_TOPIC" \
            -H "Title: OCTA vNext earnings prefetch FALLITO" \
            -H "Priority: default" \
            -H "Tags: warning" \
            -H "Click: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "Prefetch 8-K fallito. Il refresh vNext usera la cache precedente." || true
