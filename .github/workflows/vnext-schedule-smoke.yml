name: vNext Schedule Smoke Test

on:
  schedule:
    # TEMP smoke test for GitHub schedule delivery. Remove after verification.
    - cron: '40 13 30 5 *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm schedule event
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "run_id=${{ github.run_id }}"

      - name: Dispatch OCTA vNext workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/octa-vnext-refresh.yml/dispatches" \
            -d '{"ref":"main","inputs":{"force_run":"true","run_apex":"true"}}'
