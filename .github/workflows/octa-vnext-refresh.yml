name: OCTA vNext Daily Refresh

on:
  schedule:
    # Europe/Rome 08:35/08:45/08:55 primary window during daylight saving time.
    - cron: '35 6 * * 1-5'
    - cron: '45 6 * * 1-5'
    - cron: '55 6 * * 1-5'
    # Europe/Rome 09:10/09:30 retry window during daylight saving time.
    - cron: '10 7 * * 1-5'
    - cron: '30 7 * * 1-5'
    # Europe/Rome 15:30 APEX all-engines window during daylight saving time.
    - cron: '30 13 * * 2'
    # Europe/Rome 08:35/08:45/08:55 primary window during standard time.
    - cron: '35 7 * * 1-5'
    - cron: '45 7 * * 1-5'
    - cron: '55 7 * * 1-5'
    # Europe/Rome 09:10/09:30 retry window during standard time.
    - cron: '10 8 * * 1-5'
    - cron: '30 8 * * 1-5'
    # Europe/Rome 15:30 APEX all-engines window during standard time.
    - cron: '30 14 * * 2'
  workflow_dispatch:
    inputs:
      force_run:
        description: "Forza esecuzione anche se US market holiday"
        type: boolean
        default: false
      run_apex:
        description: "Genera anche segnale APEX"
        type: boolean
        default: true
      source:
        description: "Origine dispatch: app_button, netlify_schedule_octa, netlify_schedule_apex"
        type: string
        default: "manual"

permissions:
  contents: write

concurrency:
  group: octa-vnext-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Rome schedule gate
        id: rome
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          RUN_APEX_INPUT: ${{ github.event.inputs.run_apex }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          event = os.environ.get("EVENT_NAME", "")
          schedule = os.environ.get("EVENT_SCHEDULE", "")
          if event != "schedule":
              should = True
              is_apex_slot = os.environ.get("RUN_APEX_INPUT", "true").lower() == "true"
          else:
              allowed_local_times = {(8, 35), (8, 45), (8, 55), (9, 10), (9, 30), (15, 30)}
              parts = schedule.split()
              should = False
              if len(parts) >= 2:
                  scheduled_utc = datetime.now(timezone.utc).replace(
                      hour=int(parts[1]), minute=int(parts[0]), second=0, microsecond=0
                  )
                  scheduled_rome = scheduled_utc.astimezone(ZoneInfo("Europe/Rome"))
                  should = (scheduled_rome.hour, scheduled_rome.minute) in allowed_local_times
                  is_apex_slot = (scheduled_rome.weekday() == 1 and (scheduled_rome.hour, scheduled_rome.minute) == (15, 30))
              else:
                  is_apex_slot = False
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"should_run={'true' if should else 'false'}\n")
              f.write(f"is_apex_slot={'true' if is_apex_slot else 'false'}\n")
          print(f"Rome schedule gate: schedule={schedule!r}, should_run={should}, is_apex_slot={is_apex_slot}")
          PY

      - uses: actions/checkout@v4
        if: steps.rome.outputs.should_run == 'true'
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        if: steps.rome.outputs.should_run == 'true'
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python deps
        if: steps.rome.outputs.should_run == 'true'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Date and holiday gate
        id: date
        if: steps.rome.outputs.should_run == 'true'
        env:
          IS_APEX_SLOT: ${{ steps.rome.outputs.is_apex_slot }}
        run: |
          today=$(date -u +%Y-%m-%d)
          echo "today=$today" >> "$GITHUB_OUTPUT"
          HOLIDAYS="2026-01-01 2026-01-19 2026-02-16 2026-04-03 2026-05-25 2026-06-19 2026-07-03 2026-09-07 2026-11-26 2026-12-25 2027-01-01 2027-01-18 2027-02-15 2027-03-26 2027-05-31 2027-06-18 2027-07-05 2027-09-06 2027-11-25 2027-12-24 2028-01-17 2028-02-21 2028-04-14 2028-05-29 2028-06-19 2028-07-04 2028-09-04 2028-11-23 2028-12-25 2029-01-01 2029-01-15 2029-02-19 2029-03-30 2029-05-28 2029-06-19 2029-07-04 2029-09-03 2029-11-22 2029-12-25 2030-01-01 2030-01-21 2030-02-18 2030-04-19 2030-05-27 2030-06-19 2030-07-04 2030-09-02 2030-11-28 2030-12-25"
          force="${{ github.event.inputs.force_run }}"
          if [ "$force" = "true" ] || [ "$IS_APEX_SLOT" = "true" ]; then
            echo "is_holiday=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Force/APEX run requested"
          elif echo "$HOLIDAYS" | grep -qw "$today"; then
            echo "is_holiday=true" >> "$GITHUB_OUTPUT"
            echo "::notice::US market holiday ($today), skipped"
            echo "## OCTA vNext skipped (US holiday $today)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "is_holiday=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate required secrets
        id: secretcheck
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true'
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          missing=0
          for key in DASHBOARD_URL SEC_USER_AGENT; do
            if [ -z "${!key}" ]; then
              echo "::error::$key non configurato nei secrets vNext"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Configura secrets dedicati alla vNext. Non usare URL/secrets della produzione vecchia." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if [ -n "$NETLIFY_SITE_ID" ] && [ -n "$NETLIFY_AUTH_TOKEN" ]; then
            echo "deploy_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NETLIFY_AUTH_TOKEN non configurato: genero e committo il segnale, ma salto il deploy Netlify."
            echo "- Deploy Netlify saltato: manca NETLIFY_AUTH_TOKEN." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check public freshness
        id: freshguard
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true'
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          EVENT_NAME: ${{ github.event_name }}
          IS_APEX_SLOT: ${{ steps.rome.outputs.is_apex_slot }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          already = False
          reason = "manual dispatch"
          if os.environ.get("IS_APEX_SLOT") == "true":
              already = False
              reason = "APEX slot: run anyway"
          elif os.environ.get("EVENT_NAME") == "schedule":
              base = (os.environ.get("DASHBOARD_URL") or "").rstrip("/")
              current_expected = datetime.now(ZoneInfo("Europe/Rome")).date().isoformat()
              try:
                  with urllib.request.urlopen(f"{base}/freshness.json?t={int(time.time())}", timeout=12) as response:
                      data = json.load(response)
                  fresh = bool(data.get("fresh"))
                  signal_date = str(data.get("signal_date") or "")
                  public_expected_date = str(data.get("expected_signal_date") or "")
                  engine_error = bool(data.get("engine_error"))
                  already = fresh and signal_date == current_expected and not engine_error
                  reason = (
                      f"fresh={fresh}, signal_date={signal_date}, "
                      f"public_expected_signal_date={public_expected_date}, "
                      f"current_expected_signal_date={current_expected}, "
                      f"engine_error={engine_error}"
                  )
              except Exception as exc:
                  reason = f"freshness check failed: {exc!r}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"already_fresh={'true' if already else 'false'}\n")
          print(f"Public freshness guard: already_fresh={already} ({reason})")
          if already:
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
                  f.write("## OCTA vNext skipped\n")
                  f.write(f"- Public dashboard already fresh: {reason}\n")
          PY

      - name: Snapshot previous signals
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && steps.freshguard.outputs.already_fresh != 'true'
        run: |
          if [ -f dashboard/data-octa.json ]; then
            cp dashboard/data-octa.json /tmp/data-octa-prev.json
          else
            echo '{"signals":[]}' > /tmp/data-octa-prev.json
          fi
          if [ -f dashboard/apex-data.json ]; then
            cp dashboard/apex-data.json /tmp/apex-prev.json
          else
            echo '{"strategies":{}}' > /tmp/apex-prev.json
          fi

      - name: Cache prices
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && steps.freshguard.outputs.already_fresh != 'true'
        uses: actions/cache@v4
        with:
          path: data/backtest/prices_octa.csv
          key: vnext-prices-octa-${{ steps.date.outputs.today }}
          restore-keys: vnext-prices-octa-

      - name: Download prices
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && steps.freshguard.outputs.already_fresh != 'true'
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
        run: python -u -m qfas.qfas_download_prices

      - name: Run decision cycle
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && steps.freshguard.outputs.already_fresh != 'true'
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: python -u -m qfas.qfas_export_octa --mode decision

      - name: Validate data-octa.json
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && steps.freshguard.outputs.already_fresh != 'true'
        run: |
          python - <<'PY'
          import json
          d = json.load(open("dashboard/data-octa.json", encoding="utf-8"))
          assert "signals" in d, "missing signals"
          assert "candidates" in d, "missing candidates"
          assert "regime" in d, "missing regime"
          assert d.get("signal_date"), "missing signal_date"
          print(f"OK: {d['signal_date']} - {len(d['signals'])} signals - {len(d['candidates'])} candidates")
          PY

      - name: Write freshness status
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && steps.freshguard.outputs.already_fresh != 'true'
        run: python scripts/write_freshness.py --strict

      - name: Run APEX signal export
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && (steps.freshguard.outputs.already_fresh != 'true' || steps.rome.outputs.is_apex_slot == 'true' || github.event.inputs.run_apex == 'true')
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
        run: python scripts/export_apex_signal.py

      - name: Commit generated dashboard data
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && (steps.freshguard.outputs.already_fresh != 'true' || steps.rome.outputs.is_apex_slot == 'true' || github.event.inputs.run_apex == 'true')
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions OCTA vNext"
          git add dashboard/data-octa.json dashboard/freshness.json dashboard/apex-data.json
          if ! git diff --cached --quiet; then
            git commit -m "[octa-vnext] refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            if git pull --rebase origin main && git push; then
              echo "Generated dashboard data committed and pushed."
            else
              echo "::warning::Generated dashboard data was created, but GitHub could not push it. Continuing to Netlify deploy with runner files."
              echo "- Commit dati generati non pushato; deploy Netlify continua con i file generati nel runner." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No generated changes"
          fi

      - name: Deploy Netlify vNext
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && (steps.freshguard.outputs.already_fresh != 'true' || steps.rome.outputs.is_apex_slot == 'true' || github.event.inputs.run_apex == 'true') && steps.secretcheck.outputs.deploy_ready == 'true'
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          npm install -g netlify-cli@latest
          npm install --prefix netlify/functions
          netlify deploy --prod --dir=dashboard --functions=netlify/functions --no-build

      - name: Notify signal diff
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && steps.freshguard.outputs.already_fresh != 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          topic = os.environ.get("NTFY_TOPIC")
          if not topic:
              print("NTFY_TOPIC missing, skip notification")
              raise SystemExit(0)
          prev = json.load(open("/tmp/data-octa-prev.json", encoding="utf-8"))
          cur = json.load(open("dashboard/data-octa.json", encoding="utf-8"))
          prev_apex = json.load(open("/tmp/apex-prev.json", encoding="utf-8"))
          cur_apex = json.load(open("dashboard/apex-data.json", encoding="utf-8")) if os.path.exists("dashboard/apex-data.json") else {"strategies": {}}
          prev_pairs = {(s.get("action"), s.get("ticker")) for s in prev.get("signals", [])}
          new = [s for s in cur.get("signals", []) if (s.get("action"), s.get("ticker")) not in prev_pairs]
          freshness = json.load(open("dashboard/freshness.json", encoding="utf-8"))
          url = os.environ.get("DASHBOARD_URL") or "https://app.netlify.com"
          apex_lines = []
          apex_alerts = []
          prev_strats = prev_apex.get("strategies", {})
          for key, st in (cur_apex.get("strategies") or {}).items():
              cur_sig = st.get("current") or {}
              prev_sig = (prev_strats.get(key, {}).get("current") or {})
              name = st.get("name") or key
              asset = cur_sig.get("asset")
              prev_asset = prev_sig.get("asset")
              if asset and prev_asset and asset != prev_asset:
                  apex_lines.append(f"{name}: cambio {prev_asset} -> {asset} ({cur_sig.get('date')})")
              radar = st.get("radar") or {}
              if radar.get("level") in {"alert", "watch"}:
                  apex_alerts.append(
                      f"{name}: radar {radar.get('level')} verso {radar.get('radar_asset')} "
                      f"(edge {float(radar.get('edge_pp') or 0):+.1f}pp)"
                  )
          if not new and not apex_lines and not apex_alerts:
              title = f"Super Investor fresh {cur.get('signal_date')} - nessun nuovo segnale"
              body = f"OCTA completato. Fresh={freshness.get('fresh')}. Candidates={cur.get('n_candidates', 'n/d')}. APEX radar ok."
              priority = "default"
              tags = "white_check_mark"
          else:
              buys = [s for s in new if s.get("action") == "BUY"]
              sells = [s for s in new if s.get("action") == "SELL"]
              title = f"Super Investor - {len(buys)} BUY - {len(sells)} SELL - APEX {len(apex_lines) + len(apex_alerts)}"
              lines = []
              for s in buys[:8]:
                  lines.append(f"BUY {s.get('ticker')} - score {float(s.get('score') or 0):.0f} - {s.get('entry_status', '?')}")
              for s in sells[:8]:
                  lines.append(f"SELL {s.get('ticker')} - {s.get('reason') or s.get('entry_status', '?')}")
              lines.extend(apex_lines[:6])
              lines.extend(apex_alerts[:6])
              body = "\n".join(lines) or "Refresh completato."
              priority = "high" if new or apex_lines or any("alert" in x for x in apex_alerts) else "default"
              tags = "chart_with_upwards_trend,warning" if priority == "high" else "white_check_mark"
          req = urllib.request.Request(
              f"https://ntfy.sh/{topic}",
              data=body.encode("utf-8"),
              headers={"Title": title, "Priority": priority, "Tags": tags, "Click": url},
          )
          urllib.request.urlopen(req, timeout=10).read()
          print(title)
          PY

      - name: Alert on failure
        if: failure() && steps.rome.outputs.should_run == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && exit 0
          curl -fsS -X POST "https://ntfy.sh/$NTFY_TOPIC" \
            -H "Title: OCTA vNext refresh FALLITO" \
            -H "Priority: high" \
            -H "Tags: warning" \
            -H "Click: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "La vNext non ha prodotto un segnale fresco. La produzione attuale resta intatta." || true

      - name: Job summary
        if: steps.rome.outputs.should_run == 'true' && steps.date.outputs.is_holiday != 'true' && steps.freshguard.outputs.already_fresh != 'true' && success()
        run: |
          echo "## OCTA vNext Daily Refresh" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          d = json.load(open("dashboard/data-octa.json", encoding="utf-8"))
          f = json.load(open("dashboard/freshness.json", encoding="utf-8"))
          print(f"- Signal date: {d.get('signal_date')}")
          print(f"- Fresh: {f.get('fresh')}")
          print(f"- Signals: {len(d.get('signals', []))}")
          print(f"- Candidates: {d.get('n_candidates', 'n/d')}")
          for s in d.get("signals", [])[:12]:
              print(f"- {s.get('action')} {s.get('ticker')} score {float(s.get('score') or 0):.0f} - {s.get('entry_status')}")
          PY
